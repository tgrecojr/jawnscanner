services:
  jawnscanner:
    build: .
    # Or use the pre-built image:
    # image: ghcr.io/tgrecojr/jawnscanner:latest
    ports:
      - "9101:9101"
    environment:
      - LISTEN_PORT=9101
      - RUST_LOG=info
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - jawnscanner
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest@sha256:e932bd6ed0e026595b08483cd0141e5103e1ab7ff8604839ff899b8dc54cabcb
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
