services:
  jawnscanner:
    build: .
    # Or use the pre-built image:
    # image: ghcr.io/tgrecojr/jawnscanner:latest
    ports:
      - "9101:9101"
    environment:
      - LISTEN_PORT=9101
      - RUST_LOG=info
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest@sha256:dda13e28bf95a5e5ca5b8ed56852006094c1c8e8871d9c9dbeed30aa6e55271f
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - jawnscanner
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
