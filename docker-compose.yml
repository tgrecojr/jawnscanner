services:
  jawnscanner:
    build: .
    # Or use the pre-built image:
    # image: ghcr.io/tgrecojr/jawnscanner:latest
    ports:
      - "9101:9101"
    environment:
      - LISTEN_PORT=9101
      - RUST_LOG=info
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - jawnscanner
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest@sha256:2d1f9ae67c1778d33e291d4c3c759cd8b650e67491f02533499eb950e075eeb5
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
