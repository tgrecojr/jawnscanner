services:
  jawnscanner:
    build: .
    # Or use the pre-built image:
    # image: ghcr.io/tgrecojr/jawnscanner:latest
    ports:
      - "9101:9101"
    environment:
      - LISTEN_PORT=9101
      - RUST_LOG=info
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest@sha256:5550dc63da361dc30f6fe02ac0e4dfc736ededfef3c8d12a634db04a67824d78
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - jawnscanner
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
