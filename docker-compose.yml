services:
  jawnscanner:
    build: .
    # Or use the pre-built image:
    # image: ghcr.io/tgrecojr/jawnscanner:latest
    ports:
      - "9101:9101"
    environment:
      - LISTEN_PORT=9101
      - RUST_LOG=info
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - jawnscanner
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest@sha256:1c1bd67c54c5fcf6e759897852b5a584191bd6796e8d328a5ace457799801261
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
